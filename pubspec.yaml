name: fittrack
description: "A modern Fitness Tracker mobile application built with Flutter."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # iOS Style Icons
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5

  # SVG Support
  flutter_svg: ^2.2.0

  # Google Fonts
  google_fonts: ^6.3.1

  # Additional Icons
  font_awesome_flutter: ^10.10.0

  # Material Motion Animations
  animations: ^2.0.11

  # Circular & Linear Progress Indicators
  percent_indicator: ^4.2.5

  # Beautiful Charts
  fl_chart: ^1.1.1

  # Lottie Animations
  lottie: ^3.3.2

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Spacing Widget
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts (Uncomment when you add custom fonts)
  #
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700